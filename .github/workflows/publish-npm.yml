name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: |
          npm run typecheck
          npm test

      - name: Determine release state
        id: release_state
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="v${PACKAGE_VERSION}"
          PUBLISHED_VERSION="$(npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null || true)"

          echo "package_name=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

          if [ "${PUBLISHED_VERSION}" = "${PACKAGE_VERSION}" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} is already published to npm."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Version ${PACKAGE_VERSION} is not yet published to npm."
          fi

      - name: Publish package
        if: steps.release_state.outputs.should_publish == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create release tag
        if: steps.release_state.outputs.should_publish == 'true'
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.release_state.outputs.release_tag }}"
          HEAD_COMMIT="$(git rev-parse HEAD)"

          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            TAG_COMMIT="$(git rev-list -n 1 "${RELEASE_TAG}")"

            if [ "${TAG_COMMIT}" = "${HEAD_COMMIT}" ]; then
              echo "Tag ${RELEASE_TAG} already points at HEAD."
              exit 0
            fi

            echo "Tag ${RELEASE_TAG} already exists on ${TAG_COMMIT}, not ${HEAD_COMMIT}."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" -m "${{ steps.release_state.outputs.package_version }}"
          git push origin "${RELEASE_TAG}"
